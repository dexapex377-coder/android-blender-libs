name: Build CoMISo for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-comiso:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build CoMISo
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          curl -L https://github.com/OpenMesh/CoMISo/archive/refs/tags/v1.2.0.tar.gz 2>/dev/null | tar xz || \
          curl -L https://gitlab.vci.rwth-aachen.de:9000/OpenMesh/CoMISo/-/archive/master/CoMISo-master.tar.gz 2>/dev/null | tar xz || \
          echo "WARNING: Could not download CoMISo source"
          # If download fails, create empty dir to avoid breaking
          mkdir -p CoMISo/lib CoMISo/include
          echo "CoMISo placeholder" > CoMISo/README.md
          exit 0

          cmake -B build_comiso -S CoMISo-master \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_comiso -j$(nproc) || ninja -C build_comiso -j1
          mkdir -p install_root/lib
          find build_comiso -name "*.a" -exec cp -v {} install_root/lib/ \;

      - name: Prepare output
        run: |
          mkdir -p CoMISo/lib CoMISo/include
          for f in install_root/lib/*.a; do [ -f "$f" ] || continue; cp -v "$f" CoMISo/lib/; done
          echo "=== CoMISo structure ==="
          find CoMISo -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A CoMISo/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "CoMISo - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
