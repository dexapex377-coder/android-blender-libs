name: Build PugiXML for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

jobs:
  build-pugixml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download PugiXML source
        run: |
          curl -L https://github.com/zeux/pugixml/archive/refs/tags/v1.14.tar.gz -o pugixml.tar.gz
          tar xzf pugixml.tar.gz

      - name: Build PugiXML for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_pugi -S pugixml-1.14 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC=ON \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_pugi -j$(nproc)
          ninja -C build_pugi install

      - name: Prepare output
        run: |
          mkdir -p PugiXML/lib PugiXML/include
          cp -v install_root/lib/libpugixml.a PugiXML/lib/
          cp -rv install_root/include/* PugiXML/include/
          echo "=== PugiXML structure ==="
          find PugiXML -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A PugiXML/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "PugiXML 1.14 - Android arm64 API 29"
            git push
          fi
