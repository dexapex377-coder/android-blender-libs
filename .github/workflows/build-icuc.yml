name: Build ICU for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-icuc:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build ICU4C
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="$TOOLCHAIN/sysroot"
          API=29
          CC="$TOOLCHAIN/bin/aarch64-linux-android${API}-clang"
          CXX="$TOOLCHAIN/bin/aarch64-linux-android${API}-clang++"
          AR="$TOOLCHAIN/bin/llvm-ar"
          RANLIB="$TOOLCHAIN/bin/llvm-ranlib"

          curl -L https://github.com/unicode-org/icu/releases/download/release-68-1/icu4c-68_1-src.tgz | tar xz

          ICU_SOURCE=$(pwd)/icu

          # Step 1: Build ICU for the HOST (needed for data packaging tools)
          mkdir -p host_build && cd host_build
          $ICU_SOURCE/source/runConfigureICU Linux --enable-tests=no --enable-samples=no --enable-tools=yes
          make -j$(nproc)
          cd ..

          # Step 2: Cross-compile for Android
          mkdir -p android_build && cd android_build
          export CC=$CC CXX=$CXX AR=$AR RANLIB=$RANLIB
          export CFLAGS="-O2 -fPIC"
          export CXXFLAGS="-O2 -fPIC"
          export LDFLAGS="-fPIC"

          $ICU_SOURCE/source/configure \
            --host=aarch64-linux-android \
            --with-cross-build=$(pwd)/../host_build \
            --enable-tests=no \
            --enable-samples=no \
            --enable-tools=no \
            --enable-static \
            --with-data-packaging=files \
            --prefix=$(pwd)/../install_root

          make -j$(nproc) || make -j1
          # ICU's pkgdata --mode=files doesn't create subdirectories on install.
          # Pre-create them so 'make install' succeeds.
          if [ -d "out/build/icudt68l" ]; then
            for d in $(find out/build/icudt68l -type d); do
              rel="${d#out/build/}"
              mkdir -p "../install_root/share/icu/68.1/$rel"
            done
          fi
          make install || true
          cd ..

          # Combine ICU libs into single libicuc.so (matching dshawshank)
          mkdir -p install_root/lib_combined
          # Try to find .a files (install_root/lib/ or build tree)
          for lib in icui18n icuuc icudata; do
            if [ ! -f "install_root/lib/lib${lib}.a" ]; then
              found=$(find . -name "lib${lib}.a" -type f 2>/dev/null | head -1)
              if [ -n "$found" ]; then
                cp -v "$found" "install_root/lib/"
              fi
            fi
          done
          if [ -f "install_root/lib/libicui18n.a" ] && [ -f "install_root/lib/libicuuc.a" ] && [ -f "install_root/lib/libicudata.a" ]; then
            # We have .a files — merge them into a single .so
            $CC -shared -o install_root/lib_combined/libicuc.so \
              -Wl,--whole-archive install_root/lib/libicui18n.a \
              install_root/lib/libicuuc.a \
              install_root/lib/libicudata.a \
              -Wl,--no-whole-archive \
              -ldl -lpthread
          else
            # No .a files — create a linker script that pulls in all three .so files
            cp -v install_root/lib/libicui18n.so install_root/lib/libicuuc.so install_root/lib/libicudata.so install_root/lib_combined/
            # Write a linker script as libicuc.so
            cat > install_root/lib_combined/libicuc.so << 'LSCRIPT'
/* GNU ld linker script */
GROUP ( libicui18n.so libicuuc.so libicudata.so )
LSCRIPT
          fi

      - name: Prepare output
        run: |
          mkdir -p ICUC/lib ICUC/include
          cp -v install_root/lib_combined/libicuc.so ICUC/lib/ 2>/dev/null || \
            cp -v install_root/lib/libicuc.so ICUC/lib/ 2>/dev/null || true
          cp -rv install_root/include/icu4c ICUC/include/ 2>/dev/null || \
            cp -rv install_root/include/* ICUC/include/ 2>/dev/null || true
          echo "=== ICUC structure ==="
          find ICUC -type f 2>/dev/null || true

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A ICUC/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ICU4C 68-1 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master
            git rebase FETCH_HEAD
            git push
          fi
