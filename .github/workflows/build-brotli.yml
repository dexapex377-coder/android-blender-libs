name: Build Brotli for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

jobs:
  build-brotli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download Brotli source
        run: |
          curl -L https://github.com/google/brotli/archive/refs/tags/v1.1.0.tar.gz -o brotli.tar.gz
          tar xzf brotli.tar.gz

      - name: Build Brotli for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_brotli -S brotli-1.1.0 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBROTLI_BUNDLED_MODE=OFF \
            -DBROTLI_DISABLE_TESTS=ON \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_brotli -j$(nproc)
          ninja -C build_brotli install

      - name: Strip and prepare output
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          mkdir -p Brotli/lib Brotli/include

          for f in install_root/lib/*.so; do
            "$STRIP" -s "$f"
            cp -v "$f" Brotli/lib/
          done
          cp -rv install_root/include/* Brotli/include/ 2>/dev/null || true
          # brotli puts headers in include/brotli
          mkdir -p Brotli/include/brotli
          cp -rv install_root/include/brotli/* Brotli/include/brotli/ 2>/dev/null || true

          echo "=== Brotli structure ==="
          find Brotli -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Brotli/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Brotli 1.1.0 - Android arm64 API 29"
            git push
          fi
