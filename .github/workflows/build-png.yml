name: Build PNG for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

permissions: write-all

jobs:
  build-png:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download libpng source
        run: |
          curl -L https://download.sourceforge.net/libpng/libpng-1.6.43.tar.gz -o png.tar.gz
          tar xzf png.tar.gz

      - name: Build PNG for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"

          cmake -B build_png -S libpng-1.6.43 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPNG_SHARED=ON \
            -DPNG_STATIC=OFF \
            -DPNG_TESTS=OFF \
            -DZLIB_LIBRARY=-lz \
            -DZLIB_INCLUDE_DIR="$SYSROOT/usr/include" \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_png -j$(nproc)
          ninja -C build_png install

      - name: Strip and prepare output
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          mkdir -p Png/lib Png/include

          for f in install_root/lib/*.so; do
            "$STRIP" -s "$f"
            cp -v "$f" Png/lib/
          done
          cp -rv install_root/include/* Png/include/

          echo "=== PNG structure ==="
          find Png -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Png/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "PNG libpng 1.6.43 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git pull --rebase && git push
          fi
