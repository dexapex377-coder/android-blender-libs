name: Build OpenEXR for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

permissions: write-all

jobs:
  build-openexr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y ninja-build cmake

      - name: Download OpenEXR source
        run: |
          curl -L https://github.com/AcademySoftwareFoundation/openexr/archive/refs/tags/v3.2.1.tar.gz -o openexr.tar.gz
          tar xzf openexr.tar.gz
          rm -rf openexr-3.2.1/src/test
          sed -i '/add_subdirectory.*src\/test/d' openexr-3.2.1/CMakeLists.txt

      - name: Build OpenEXR for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_openexr -S openexr-3.2.1 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DOPENEXR_BUILD_TOOLS=OFF \
            -DOPENEXR_INSTALL=ON \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_openexr -j$(nproc)
          ninja -C build_openexr install

      - name: Strip and prepare output
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          mkdir -p OpenExr/lib OpenExr/include/OpenEXR

          # Strip and copy .so files
          for f in install_root/lib/*.so; do
            "$STRIP" -s "$f"
            cp -v "$f" OpenExr/lib/
          done

          # Copy headers
          cp -rv install_root/include/OpenEXR/* OpenExr/include/OpenEXR/
          cp -rv install_root/include/Imath/* OpenExr/include/Imath/ 2>/dev/null || true

          echo "=== OpenExr structure ==="
          find OpenExr -type f | sort

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A OpenExr/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "OpenEXR 3.2.1 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git push
          fi
