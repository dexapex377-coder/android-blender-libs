name: Build Embree for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-embree:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build Embree
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          curl -L https://github.com/embree/embree/archive/refs/tags/v4.3.3.tar.gz | tar xz

          LIB_DIR=$(pwd)

          cmake -B build_embree -S embree-4.3.3 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DEMBREE_ISPC_SUPPORT=OFF \
            -DEMBREE_TUTORIALS=OFF \
            -DEMBREE_TESTING=OFF \
            -DEMBREE_MAX_ISA=NEON \
            -DTBB_ROOT_DIR="$LIB_DIR/Tbb" \
            -DTBB_INCLUDE_DIR="$LIB_DIR/Tbb/include" \
            -DTBB_LIBRARY="$LIB_DIR/Tbb/lib/libtbb.so" \
            -DTBB_LIBRARY_DIR="$LIB_DIR/Tbb/lib" \
            -DTBB_VERSION_FILE="$LIB_DIR/Tbb/include/tbb/version.h" \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_embree -j$(nproc) || ninja -C build_embree -j1
          mkdir -p install_root/lib install_root/include
          find build_embree -name "*.so" -exec cp -v {} install_root/lib/ \;
          cp -rv embree-4.3.3/include/* install_root/include/ 2>/dev/null || true

      - name: Prepare output
        run: |
          mkdir -p Embree/lib Embree/include
          for f in install_root/lib/*.so; do [ -f "$f" ] || continue; cp -v "$f" Embree/lib/; done
          cp -rv install_root/include/* Embree/include/ 2>/dev/null || true
          echo "=== Embree structure ==="
          find Embree -type f | head -10

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Embree/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "Embree 4.3.3 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
