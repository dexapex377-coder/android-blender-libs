name: Build OpenVDB for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-openvdb:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build OpenVDB
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          LIB_DIR=$(pwd)

          curl -L https://github.com/AcademySoftwareFoundation/openvdb/archive/refs/tags/v12.0.0.tar.gz | tar xz

          # OpenVDB needs Boost - create compat header for oneTBB
          echo '#include <tbb/version.h>' > Tbb/include/tbb/tbb_stddef.h

          cmake -B build_vdb -S openvdb-12.0.0 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DOPENVDB_BUILD_CORE=ON \
            -DOPENVDB_BUILD_BINARIES=OFF \
            -DOPENVDB_BUILD_PYTHON_MODULE=OFF \
            -DOPENVDB_BUILD_UNITTESTS=OFF \
            -DOPENVDB_BUILD_DOCS=OFF \
            -DOPENVDB_BUILD_HOUDINI_PLUGIN=OFF \
            -DOPENVDB_BUILD_MAYA_PLUGIN=OFF \
            -DOPENVDB_BUILD_AX=OFF \
            -DOPENVDB_BUILD_NANOVDB=OFF \
            -DUSE_EXR=OFF \
            -DUSE_PNG=OFF \
            -DUSE_LOG4CPLUS=OFF \
            -DUSE_BLOSC=ON \
            -DBlosc_ROOT="$LIB_DIR/blosc" \
            -DTBB_ROOT_DIR="$LIB_DIR/Tbb" \
            -DBoost_INCLUDE_DIR="$LIB_DIR/Boost/include" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_vdb -j$(nproc) || ninja -C build_vdb -j1
          mkdir -p install_root/lib install_root/include
          find build_vdb -name "*.so" -exec cp -v {} install_root/lib/ \;
          cp -rv openvdb-12.0.0/openvdb install_root/include/ 2>/dev/null || true

      - name: Prepare output
        run: |
          mkdir -p OpenVDB/lib OpenVDB/include
          for f in install_root/lib/*.so; do [ -f "$f" ] || continue; cp -v "$f" OpenVDB/lib/; done
          cp -rv install_root/include/* OpenVDB/include/ 2>/dev/null || true
          echo "=== OpenVDB structure ==="
          find OpenVDB -type f | head -10

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A OpenVDB/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "OpenVDB 12.0.0 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
