name: Build zstd for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-zstd:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build zstd
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          curl -L https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz | tar xz

          cmake -B build_zstd -S zstd-1.5.6/build/cmake \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DZSTD_BUILD_PROGRAMS=OFF \
            -DZSTD_BUILD_SHARED=ON \
            -DZSTD_BUILD_STATIC=OFF \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_zstd -j$(nproc)
          ninja -C build_zstd install

      - name: Prepare output
        run: |
          mkdir -p Zstd/lib Zstd/include
          cp -v install_root/lib/libzstd.so Zstd/lib/ 2>/dev/null || true
          cp -rv install_root/include/* Zstd/include/ 2>/dev/null || true
          cp -rv install_root/lib/pkgconfig Zstd/ 2>/dev/null || true
          echo "=== Zstd structure ==="
          find Zstd -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Zstd/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "zstd 1.5.6 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master
            git rebase FETCH_HEAD
            git push
          fi
