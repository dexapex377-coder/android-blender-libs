name: Build SQLite for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-sqlite:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build SQLite
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="$TOOLCHAIN/sysroot"
          API=29
          CC="$TOOLCHAIN/bin/aarch64-linux-android${API}-clang"
          AR="$TOOLCHAIN/bin/llvm-ar"

          # SQLite amalgamation - download from sqlite.org (not GitHub, which lacks sqlite3.c)
          curl -L https://www.sqlite.org/2024/sqlite-amalgamation-3460000.zip -o sqlite.zip
          unzip -o sqlite.zip
          cd sqlite-amalgamation-3460000

          $CC -O2 -fPIC \
            -DSQLITE_THREADSAFE=1 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_RTREE \
            -DSQLITE_ENABLE_JSON1 \
            -DSQLITE_ENABLE_COLUMN_METADATA \
            -DSQLITE_ENABLE_UNLOCK_NOTIFY \
            -shared -o libsqlite3.so sqlite3.c -ldl

          cd ..
          mkdir -p install_root/lib install_root/include
          cp sqlite-amalgamation-3460000/libsqlite3.so install_root/lib/
          cp sqlite-amalgamation-3460000/sqlite3.h install_root/include/
          cp sqlite-amalgamation-3460000/sqlite3ext.h install_root/include/

      - name: Prepare output
        run: |
          mkdir -p SQLite/lib SQLite/include
          cp -v install_root/lib/libsqlite3.so SQLite/lib/
          cp -v install_root/include/*.h SQLite/include/
          echo "=== SQLite structure ==="
          find SQLite -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A SQLite/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "SQLite 3.46 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master
            git rebase FETCH_HEAD
            git push
          fi
