name: Build yaml-cpp for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

permissions: write-all

jobs:
  build-yamlcpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download yaml-cpp source
        run: |
          curl -L https://github.com/jbeder/yaml-cpp/archive/refs/tags/0.8.0.tar.gz -o yaml-cpp.tar.gz
          tar xzf yaml-cpp.tar.gz

      - name: Build yaml-cpp for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_yaml -S yaml-cpp-0.8.0 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC=ON \
            -DYAML_CPP_BUILD_TESTS=OFF \
            -DYAML_CPP_BUILD_TOOLS=OFF \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_yaml -j$(nproc)
          ninja -C build_yaml install

      - name: Prepare output
        run: |
          mkdir -p YamlCpp/lib YamlCpp/include
          cp -v install_root/lib/libyaml-cpp.a YamlCpp/lib/
          cp -rv install_root/include/* YamlCpp/include/
          echo "=== yaml-cpp structure ==="
          find YamlCpp -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A YamlCpp/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "yaml-cpp 0.8.0 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git fetch origin master && git rebase FETCH_HEAD && git push
          fi
