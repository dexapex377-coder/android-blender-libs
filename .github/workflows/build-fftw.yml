name: Build FFTW3 for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

permissions: write-all

jobs:
  build-fftw3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download FFTW3 source
        run: |
          curl -L https://fftw.org/fftw-3.3.10.tar.gz -o fftw.tar.gz
          tar xzf fftw.tar.gz

      - name: Build FFTW3 for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_fftw -S fftw-3.3.10 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_FLOAT=ON \
            -DDISABLE_FORTRAN=ON \
            -DWITH_OPENMP=OFF \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_fftw -j$(nproc)
          ninja -C build_fftw install

      - name: Strip and prepare output
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          mkdir -p Fftw/lib Fftw/include

          for f in install_root/lib/*.so; do
            "$STRIP" -s "$f"
            cp -v "$f" Fftw/lib/
          done
          cp -rv install_root/include/* Fftw/include/

          echo "=== FFTW3 structure ==="
          find Fftw -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Fftw/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "FFTW3 3.3.10 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git push
          fi
