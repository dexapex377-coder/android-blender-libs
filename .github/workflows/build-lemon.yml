name: Build Lemon for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-lemon:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build Lemon
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64"
          API=29
          CC="$TOOLCHAIN/bin/aarch64-linux-android${API}-clang"
          AR="$TOOLCHAIN/bin/llvm-ar"

          # Get lemon.c from SQLite source
          curl -L https://github.com/sqlite/sqlite/archive/refs/tags/version-3.46.0.tar.gz | tar xz

          # Compile lemon into a static library (used by other cmake as a parser)
          $CC -O2 -fPIC -c sqlite-version-3.46.0/tool/lemon.c -o lemon.o
          $AR rcs libemon.a lemon.o

          mkdir -p install_root/lib install_root/include
          cp libemon.a install_root/lib/
          cp sqlite-version-3.46.0/tool/lempar.c install_root/include/ 2>/dev/null || true

      - name: Prepare output
        run: |
          mkdir -p Lemon/lib Lemon/include
          cp -v install_root/lib/libemon.a Lemon/lib/
          cp -v install_root/include/lempar.c Lemon/include/ 2>/dev/null || true
          echo "=== Lemon structure ==="
          find Lemon -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Lemon/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "Lemon parser - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
