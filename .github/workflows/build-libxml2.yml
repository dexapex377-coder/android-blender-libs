name: Build LibXML2 for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

jobs:
  build-libxml2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -m cmake ninja-build python3

      - name: Download LibXML2 source
        run: |
          curl -L https://gitlab.gnome.org/GNOME/libxml2/-/archive/v2.12.5/libxml2-v2.12.5.tar.gz -o libxml2.tar.gz
          tar xzf libxml2.tar.gz

      - name: Build LibXML2 for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"

          cmake -B build_xml -S libxml2-v2.12.5 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DLIBXML2_WITH_PYTHON=OFF \
            -DLIBXML2_WITH_TESTS=OFF \
            -DLIBXML2_WITH_PROGRAMS=OFF \
            -DLIBXML2_WITH_ICONV=OFF \
            -DLIBXML2_WITH_LZMA=OFF \
            -DZLIB_LIBRARY=-lz \
            -DZLIB_INCLUDE_DIR="$SYSROOT/usr/include" \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_xml -j$(nproc)
          ninja -C build_xml install

      - name: Strip and prepare output
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          mkdir -p LibXML/lib LibXML/include

          for f in install_root/lib/*.so; do
            "$STRIP" -s "$f"
            cp -v "$f" LibXML/lib/
          done
          cp -rv install_root/include/* LibXML/include/ 2>/dev/null || true
          cp -rv install_root/include/libxml2/* LibXML/include/ 2>/dev/null || true

          echo "=== LibXML structure ==="
          find LibXML -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A LibXML/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "LibXML2 2.12.5 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git push
          fi
