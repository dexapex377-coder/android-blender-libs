name: Build Blosc for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

permissions: write-all

jobs:
  build-blosc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download Blosc source
        run: |
          curl -L https://github.com/Blosc/c-blosc/archive/refs/tags/v1.21.5.tar.gz -o blosc.tar.gz
          tar xzf blosc.tar.gz

      - name: Build Blosc for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_blosc -S c-blosc-1.21.5 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DDEACTIVATE_SNAPPY=ON \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_blosc -j$(nproc)
          ninja -C build_blosc install

      - name: Prepare output
        run: |
          mkdir -p blosc/lib blosc/include
          cp -v install_root/lib/libblosc.a blosc/lib/
          cp -rv install_root/include/* blosc/include/
          echo "=== Blosc structure ==="
          find blosc -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A blosc/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Blosc 1.21.5 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git push
          fi
