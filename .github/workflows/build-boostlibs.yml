name: Build Boost compiled libs for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-boostlibs:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build Boost libs
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64"
          API=29

          # Download Boost source
          curl -L https://archives.boost.io/release/1.71.0/source/boost_1_71_0.tar.gz | tar xz
          cd boost_1_71_0

          # Patch common.jam for NDK clang compat
          sed -i '976,983s/^/#/' tools/build/src/tools/common.jam 2>/dev/null || true

          # Bootstrap
          ./bootstrap.sh --with-toolset=clang

          # Create user-config.jam
          cat > user-config.jam << JAM
using clang : arm64 : $TOOLCHAIN/bin/aarch64-linux-android${API}-clang++
:
<archiver>$TOOLCHAIN/bin/llvm-ar
<ranlib>$TOOLCHAIN/bin/llvm-ranlib
<compileflags>--target=aarch64-linux-android${API}
<compileflags>-fPIC
<compileflags>-std=c++17
<linkflags>-fuse-ld=lld
;
JAM

          # Build only the needed libs (disable python since we don't have cpython yet)
          ./b2 -q -j$(nproc) \
            target-os=android \
            toolset=clang-arm64 \
            architecture=arm \
            address-model=64 \
            link=shared \
            runtime-link=shared \
            threading=multi \
            variant=release \
            --layout=tagged \
            --user-config=user-config.jam \
            --with-iostreams \
            --with-locale \
            --build-dir=build_android \
            --stagedir=stage_android \
            -sNO_ZLIB=1 \
            -sNO_BZIP2=1 \
            boost.locale.iconv=off \
            boost.locale.icu=off \
            stage 2>&1 | tail -20

          cd ..

          # Collect output
          mkdir -p install_root/lib install_root/include
          cp -v boost_1_71_0/stage_android/lib/*.so install_root/lib/ 2>/dev/null || true
          cp -rv boost_1_71_0/boost install_root/include/ 2>/dev/null || true

      - name: Prepare BoostLocal output
        run: |
          mkdir -p BoostLocal/lib
          for f in install_root/lib/*locale*; do [ -f "$f" ] || continue; cp -v "$f" BoostLocal/lib/; done
          echo "=== BoostLocal ==="
          find BoostLocal -type f

      - name: Commit BoostLocal to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A BoostLocal/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "Boost.Locale 1.71.0 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi

      - name: Prepare BoostIOStream output
        run: |
          mkdir -p BoostIOStream/lib
          for f in install_root/lib/*iostreams*; do [ -f "$f" ] || continue; cp -v "$f" BoostIOStream/lib/; done
          echo "=== BoostIOStream ==="
          find BoostIOStream -type f

      - name: Commit BoostIOStream to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A BoostIOStream/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "Boost.IOStreams 1.71.0 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
