name: Build OpenCOLLADA for Android

on:
  push:

jobs:
  build-opencollada:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build OpenCOLLADA
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          LIB_DIR=$(pwd)

          curl -L https://github.com/KhronosGroup/OpenCOLLADA/archive/refs/tags/v1.6.68.tar.gz | tar xz

          for f in COLLADABaseUtils GeneratedSaxParser COLLADASaxFrameworkLoader COLLADAFramework; do
            sed -i '1i cmake_policy(SET CMP0021 OLD)' OpenCOLLADA-1.6.68/$f/CMakeLists.txt 2>/dev/null || true
          done

          sed -i 's/\r$//' OpenCOLLADA-1.6.68/CMakeLists.txt
          sed -i '/^find_package(PCRE)$/,/^endif()$/c\
set(PCRE_FOUND FALSE)\
set(PCRE_INCLUDE_DIR "")\
set(PCRE_LIBRARIES "")
' OpenCOLLADA-1.6.68/CMakeLists.txt

          sed -i 's/\${PCRE_INCLUDE_DIR}//g' OpenCOLLADA-1.6.68/COLLADABaseUtils/CMakeLists.txt
          sed -i 's/\${PCRE_LIBRARIES}//g' OpenCOLLADA-1.6.68/COLLADABaseUtils/CMakeLists.txt

          cmake -B build_ocollada -S OpenCOLLADA-1.6.68 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DUSE_STATIC=OFF \
            -DUSE_SHARED=ON \
            -DUSE_LIBXML=ON \
            -DLIBXML2_INCLUDE_DIR="$LIB_DIR/LibXML/include/libxml2" \
            -DLIBXML2_LIBRARY="$LIB_DIR/LibXML/lib/libxml2.so" \
            -DUSE_COLLADA_VALIDATOR=OFF \
            -DUSE_DAE_VALIDATOR=OFF \
            -DUSE_PCRE=OFF \
            -DCMAKE_POLICY_DEFAULT_CMP0021=OLD \
            -DCMAKE_POLICY_DEFAULT_CMP0054=OLD \
            -DCMAKE_SKIP_INSTALL_ALL_DEPENDENCY=ON \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_ocollada -j$(nproc) || ninja -C build_ocollada -j1

          mkdir -p install_root/lib install_root/include
          find build_ocollada -name "*.so" -exec cp -v {} install_root/lib/ \;
          cp -rv OpenCOLLADA-1.6.68/COLLADABaseUtils/include/* install_root/include/ 2>/dev/null || true
          cp -rv OpenCOLLADA-1.6.68/COLLADAFramework/include/* install_root/include/ 2>/dev/null || true
          cp -rv OpenCOLLADA-1.6.68/COLLADASaxFrameworkLoader/include/* install_root/include/ 2>/dev/null || true
          cp -rv OpenCOLLADA-1.6.68/GeneratedSaxParser/include/* install_root/include/ 2>/dev/null || true

      - name: Prepare output
        run: |
          mkdir -p OpenCOLLADA/lib OpenCOLLADA/include
          for f in install_root/lib/*.so; do [ -f "$f" ] || continue; cp -v "$f" OpenCOLLADA/lib/; done
          cp -rv install_root/include/* OpenCOLLADA/include/ 2>/dev/null || true
          echo "=== OpenCOLLADA structure ==="
          find OpenCOLLADA -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A OpenCOLLADA/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "OpenCOLLADA 1.6.68 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
