name: Build OpenImageDenoise for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-oidn:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build OpenImageDenoise
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          curl -L https://github.com/OpenImageDenoise/oidn/releases/download/v2.3.2/oidn-2.3.2.src.tar.gz | tar xz

          # Patch thread.cpp: pthread_[get|set]affinity_np not available on Android Bionic
          sed -i 's/pthread_getaffinity_np(thread, sizeof(cpu_set_t), &oldAffinities\[threadIndex\])/sched_getaffinity(0, sizeof(cpu_set_t), \&oldAffinities[threadIndex])/' \
            oidn-2.3.2/core/thread.cpp
          sed -i 's/pthread_setaffinity_np(thread, sizeof(cpu_set_t), &affinities\[threadIndex\])/sched_setaffinity(0, sizeof(cpu_set_t), \&affinities[threadIndex])/' \
            oidn-2.3.2/core/thread.cpp
          sed -i 's/pthread_setaffinity_np(thread, sizeof(cpu_set_t), &oldAffinities\[threadIndex\])/sched_setaffinity(0, sizeof(cpu_set_t), \&oldAffinities[threadIndex])/' \
            oidn-2.3.2/core/thread.cpp

          # Install ISPC (required for CPU device)
          curl -L https://github.com/ispc/ispc/releases/download/v1.24.0/ispc-v1.24.0-linux.tar.gz | tar xz
          export PATH="$PWD/ispc-v1.24.0-linux/bin:$PATH"

          LIB_DIR=$(pwd)

          cmake -B build_oidn -S oidn-2.3.2 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DTBB_ROOT="$LIB_DIR/Tbb" \
            -DTBB_DIR="$LIB_DIR/Tbb/lib/cmake/TBB" \
            -DTBB_INCLUDE_DIR="$LIB_DIR/Tbb/include" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH \
            -DOIDN_BUILD_TOOLS=OFF \
            -DOIDN_BUILD_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_oidn -j$(nproc) || ninja -C build_oidn -j1
          mkdir -p install_root/lib install_root/include
          find build_oidn -name "*.so" -exec cp -v {} install_root/lib/ \;
          cp -rv oidn-2.3.2/include/* install_root/include/ 2>/dev/null || true

      - name: Prepare output
        run: |
          mkdir -p Oidn/lib Oidn/include
          for f in install_root/lib/*.so; do [ -f "$f" ] || continue; cp -v "$f" Oidn/lib/; done
          for f in install_root/lib/*.a; do [ -f "$f" ] || continue; cp -v "$f" Oidn/lib/; done
          cp -rv install_root/include/* Oidn/include/ 2>/dev/null || true
          echo "=== OIDN structure ==="
          find Oidn -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Oidn/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "OpenImageDenoise 2.3.2 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
