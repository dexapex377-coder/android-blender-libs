name: Build OpenImageIO for Android

on: push

jobs:
  build-openimageio:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build OpenImageIO
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          LIB_DIR=$(pwd)

          curl -L https://github.com/AcademySoftwareFoundation/OpenImageIO/archive/refs/tags/v3.1.14.0.tar.gz | tar xz

          # Apple's clang on macOS
          # Create OpenColorIO cmake config
          mkdir -p OpenColorIO/lib/cmake/OpenColorIO
          cat > OpenColorIO/lib/cmake/OpenColorIO/OpenColorIOConfig.cmake << 'EOFCM'
if(NOT TARGET OpenColorIO::OpenColorIO)
  add_library(OpenColorIO::OpenColorIO SHARED IMPORTED)
  set_target_properties(OpenColorIO::OpenColorIO PROPERTIES
    IMPORTED_LOCATION "${CMAKE_CURRENT_LIST_DIR}/../../../../lib/libOpenColorIO.so"
    INTERFACE_INCLUDE_DIRECTORIES "${CMAKE_CURRENT_LIST_DIR}/../../../../include"
  )
endif()
set(OpenColorIO_FOUND TRUE)
set(OPENCOLORIO_VERSION "2.3.2")
EOFCM
          # Create tbb_stddef.h compat header for oneTBB (though USE_TBB=OFF)
          # Fix cmake path: ensure IMath/lib/cmake/Imath/ exists for find_package
          rm -rf "$LIB_DIR/IMath/lib/cmake"
          mkdir -p "$LIB_DIR/IMath/lib"
          cp -r "$LIB_DIR/IMath/cmake" "$LIB_DIR/IMath/lib/cmake" 2>/dev/null || true

          cmake -B build_oii -S OpenImageIO-3.1.14.0 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DOIIO_BUILD_TOOLS=OFF \
            -DOIIO_BUILD_TESTS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_DOCS=OFF \
            -DUSE_PYTHON=OFF \
            -DUSE_OPENCV=OFF \
            -DUSE_FFMPEG=OFF \
            -DUSE_OPENGL=OFF \
            -DUSE_TBB=OFF \
            -DUSE_FREETYPE=OFF \
            -DUSE_LIBCPLUSPLUS=OFF \
            -DZLIB_LIBRARY="$SYSROOT/usr/lib/aarch64-linux-android/29/libz.so" \
            -DZLIB_INCLUDE_DIR="$SYSROOT/usr/include" \
            -DImath_DIR="$LIB_DIR/IMath/lib/cmake/Imath" \
            -DImath_ROOT="$LIB_DIR/IMath" \
            -DOpenEXR_DIR="$LIB_DIR/OpenExr/lib/cmake/OpenEXR" \
            -DOpenEXR_ROOT="$LIB_DIR/OpenExr" \
            -DJPEG_ROOT="$LIB_DIR/JPEG" \
            -DJPEG_INCLUDE_DIR="$LIB_DIR/JPEG/include" \
            -DJPEG_LIBRARY="$LIB_DIR/JPEG/lib/libjpeg.a" \
            -Dlibjpeg-turbo_DIR="$LIB_DIR/JPEG/lib/cmake/libjpeg-turbo" \
            -DTIFF_ROOT="$LIB_DIR/TIFF" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DOpenColorIO_DIR="$LIB_DIR/OpenColorIO/lib/cmake/OpenColorIO" \
            -DCMAKE_PREFIX_PATH="$LIB_DIR/IMath:$LIB_DIR/OpenExr:$LIB_DIR/boost/boost_1_71_0:$LIB_DIR/TIFF:$LIB_DIR/JPEG:$LIB_DIR/OpenColorIO" \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_oii -j$(nproc) || ninja -C build_oii -j1
          mkdir -p install_root/lib install_root/include
          find build_oii -name "*.so" -exec cp -v {} install_root/lib/ \;
          cp -rv OpenImageIO-3.1.14.0/include/* install_root/include/ 2>/dev/null || true

      - name: Prepare output
        run: |
          mkdir -p OpenImageIO/lib OpenImageIO/include
          for f in install_root/lib/*.so; do [ -f "$f" ] || continue; cp -v "$f" OpenImageIO/lib/; done
          cp -rv install_root/include/* OpenImageIO/include/ 2>/dev/null || true
          echo "=== OpenImageIO structure ==="
          find OpenImageIO -type f | head -10

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A OpenImageIO/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "OpenImageIO 3.1.14.0 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
