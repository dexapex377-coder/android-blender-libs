name: Build OpenImageIO for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-openimageio:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build OpenImageIO
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          LIB_DIR=$(pwd)

          curl -L https://github.com/AcademySoftwareFoundation/OpenImageIO/archive/refs/tags/v3.1.14.0.tar.gz | tar xz

          cmake -B build_oii -S OpenImageIO-3.1.14.0 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DOIIO_BUILD_TOOLS=OFF \
            -DOIIO_BUILD_TESTS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_DOCS=OFF \
            -DUSE_PYTHON=OFF \
            -DUSE_OPENCV=OFF \
            -DUSE_FFMPEG=OFF \
            -DUSE_OPENGL=OFF \
            -DUSE_TBB=OFF \
            -DZLIB_LIBRARY="$SYSROOT/usr/lib/aarch64-linux-android/29/libz.so" \
            -DZLIB_INCLUDE_DIR="$SYSROOT/usr/include" \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_oii -j$(nproc) || ninja -C build_oii -j1
          mkdir -p install_root/lib install_root/include
          find build_oii -name "*.so" -exec cp -v {} install_root/lib/ \;
          cp -rv OpenImageIO-3.1.14.0/include/* install_root/include/ 2>/dev/null || true

      - name: Prepare output
        run: |
          mkdir -p OpenImageIO/lib OpenImageIO/include
          for f in install_root/lib/*.so; do [ -f "$f" ] || continue; cp -v "$f" OpenImageIO/lib/; done
          cp -rv install_root/include/* OpenImageIO/include/ 2>/dev/null || true
          echo "=== OpenImageIO structure ==="
          find OpenImageIO -type f | head -10

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A OpenImageIO/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "OpenImageIO 3.1.14.0 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
