name: Build OpenColorIO for Android

on:
  push:
    paths-ignore:
      - 'README.md'
      - '**/*.md'

jobs:
  build-opencolorio:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build OpenColorIO
        run: |
          set -e
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"
          SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          LIB_DIR=$(pwd)

          curl -L https://github.com/AcademySoftwareFoundation/OpenColorIO/archive/refs/tags/v2.5.2.tar.gz | tar xz

          cmake -B build_ocio -S OpenColorIO-2.5.2 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DOCIO_BUILD_APPS=OFF \
            -DOCIO_BUILD_TESTS=OFF \
            -DOCIO_BUILD_GPU_TESTS=OFF \
            -DOCIO_BUILD_DOCS=OFF \
            -DOCIO_BUILD_PYTHON=OFF \
            -DOCIO_BUILD_JAVA=OFF \
            -DOCIO_INSTALL_EXT_PACKAGES=MISSING \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_ocio -j$(nproc) || ninja -C build_ocio -j1
          mkdir -p install_root/lib install_root/include
          find build_ocio -name "*.so" -exec cp -v {} install_root/lib/ \;
          cp -rv OpenColorIO-2.5.2/include/* install_root/include/ 2>/dev/null || true
          # Copy generated OpenColorABI.h from build dir (contains correct OCIO_NAMESPACE)
          find build_ocio -name "OpenColorABI.h" -exec cp -v {} install_root/include/OpenColorIO/ \;

      - name: Prepare output
        run: |
          mkdir -p OpenColorIO/lib OpenColorIO/include
          for f in install_root/lib/*.so; do [ -f "$f" ] || continue; cp -v "$f" OpenColorIO/lib/; done
          cp -rv install_root/include/* OpenColorIO/include/ 2>/dev/null || true
          echo "=== OpenColorIO structure ==="
          find OpenColorIO -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A OpenColorIO/
          if git diff --cached --quiet; then echo "No changes"; else
            git commit -m "OpenColorIO 2.5.2 - Android arm64 API 29"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin master && git rebase FETCH_HEAD && git push
          fi
