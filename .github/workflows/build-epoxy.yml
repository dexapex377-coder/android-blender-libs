name: Build Epoxy for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

permissions: write-all

jobs:
  build-epoxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build python3-pip meson

      - name: Download Epoxy source
        run: |
          curl -L https://github.com/anholt/libepoxy/archive/refs/tags/1.5.10.tar.gz -o epoxy.tar.gz
          tar xzf epoxy.tar.gz
          ls -la

      - name: Build Epoxy for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64"
          export CC="$TOOLCHAIN/bin/aarch64-linux-android29-clang"
          export CXX="$TOOLCHAIN/bin/aarch64-linux-android29-clang++"
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export PKG_CONFIG_LIBDIR="$TOOLCHAIN/sysroot/usr/lib/aarch64-linux-android"

          cd libepoxy-1.5.10
          meson setup build_epoxy \
            --cross-file /dev/null \
            -Dprefix=$PWD/install_root \
            -Dbuildtype=release \
            -Dglx=no \
            -Degl=yes \
            -Dtests=false \
            -Ddefault_library=static
          ninja -C build_epoxy -j$(nproc)
          ninja -C build_epoxy install
          cd ..

      - name: Prepare output
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          mkdir -p Epoxy/lib Epoxy/include
          find libepoxy-1.5.10/install_root -name '*.a' -exec cp -v {} Epoxy/lib/ \;
          find libepoxy-1.5.10/install_root -name '*.h' -exec cp -v --parents {} Epoxy/include/ \; 2>/dev/null || true
          find libepoxy-1.5.10/install_root/include -type f -exec cp -v {} Epoxy/include/ \; 2>/dev/null || true
          echo "=== Epoxy structure ==="
          find Epoxy -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Epoxy/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git pull --rebase && git push
          fi
