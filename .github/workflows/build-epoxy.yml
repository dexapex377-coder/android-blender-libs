name: Build Epoxy for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

jobs:
  build-epoxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download Epoxy source
        run: |
          curl -L https://github.com/anholt/libepoxy/archive/refs/tags/1.5.10.tar.gz -o epoxy.tar.gz
          tar xzf epoxy.tar.gz

      - name: Build Epoxy for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_epoxy -S libepoxy-1.5.10 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC=ON \
            -DEPOXY_BUILD_TESTS=OFF \
            -DEPOXY_BUILD_EGL=ON \
            -DEPOXY_BUILD_GLX=OFF \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_epoxy -j$(nproc)
          ninja -C build_epoxy install

      - name: Prepare output
        run: |
          mkdir -p Epoxy/lib Epoxy/include
          cp -v install_root/lib/libepoxy.a Epoxy/lib/
          cp -rv install_root/include/* Epoxy/include/ 2>/dev/null || true
          echo "=== Epoxy structure ==="
          find Epoxy -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A Epoxy/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Epoxy 1.5.10 - Android arm64 API 29 (EGL only)"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git && git push
          fi
