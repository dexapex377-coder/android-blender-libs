name: Build SDL2 for Android

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  NDK_VERSION: r26d

jobs:
  build-sdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build

      - name: Download SDL2 source
        run: |
          curl -L https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.28.5.tar.gz -o sdl2.tar.gz
          tar xzf sdl2.tar.gz

      - name: Build SDL2 for Android
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="$NDK_DIR/build/cmake/android.toolchain.cmake"

          cmake -B build_sdl -S SDL-release-2.28.5 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DSDL_STATIC=OFF \
            -DSDL_TEST=OFF \
            -DSDL_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=install_root

          ninja -C build_sdl -j$(nproc)
          ninja -C build_sdl install

      - name: Strip and prepare output
        run: |
          NDK_DIR="${{ steps.setup-ndk.outputs.ndk-path }}"
          STRIP="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          mkdir -p SDL/lib SDL/include

          for f in install_root/lib/*.so; do
            "$STRIP" -s "$f"
            cp -v "$f" SDL/lib/
          done
          cp -rv install_root/include/* SDL/include/ 2>/dev/null || true
          cp -rv install_root/include/SDL2/* SDL/include/ 2>/dev/null || true

          echo "=== SDL structure ==="
          find SDL -type f

      - name: Commit and push to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A SDL/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "SDL2 2.28.5 - Android arm64 API 29"
            git push
          fi
